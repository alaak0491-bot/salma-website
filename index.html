<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
    text-align: center;
    font-family: Arial;
    background-color: #ffe6e6;
    padding-top: 100px;
}

h1 {
    font-size: 28px;
}

p {
    font-size: 20px;
    margin-top: 10px;
}

button {
    margin-top: 30px;
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background-color: #ff4d6d;
    color: white;
    cursor: pointer;
}

button:hover {
    background-color: #ff1a4d;
}

    .container {
    text-align: center;
    margin-top: 100px;
    font-family: Arial;
}

.envelope {
    font-size: 80px;
    cursor: pointer;
    transition: transform 0.3s;
}

.envelope:hover {
    transform: scale(1.1);
}

.letter {
    margin-top: 30px;
    padding: 20px;
    width: 60%;
    margin-left: auto;
    margin-right: auto;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
}

.hidden {
    display: none;
}
    
</style>

</head>

<body>

<h1> عارف انك زعلانه و مخنوقة </h1>
<p> يلا نلعب لعبه بسيطة </p>

<button onclick="goNext()">يلا 😌</button>

<script>
function goNext() {
    document.body.innerHTML = `
    <h1>من يسكن البحر و يحبه الناس ؟</h1>

    <button onclick="wrong()">هيفاء وهبي </button>
    <button onclick="right()">سبونج بوب سكوير بانتس </button>
    <button onclick="wrong()">هيلو كيتي </button>
    `;
}

  function wrong() {
    alert("غلط 😤 ركزي كده شوية");
}

function right() {
    document.body.innerHTML = `
    <h1>😂شطورة يا سلمي </h1>
    <p>يلا بينا السؤال اللي بعده ؟</p>

    <button onclick="nextPage()">يلا </button>
    `;
}

function nextPage() {
    document.body.innerHTML = `
    <h1>اختاري كلمة توصفني </h1>

    <button id="a1" onclick="wrongMove('a1')">رخم </button>
    <button id="a2" onclick="rightAnswer()">صاحبي </button>
    <button id="a3" onclick="wrongMove('a3')">غلس </button>
    `;
}

  function wrongMove(id) {
    let btn = document.getElementById(id);

    btn.style.position = "relative";
    btn.style.left = Math.random() * 200 + "px";
    btn.style.top = Math.random() * 50 + "px";

    btn.innerText = "لاا 😤 مش هتختارني";
}

  function rightAnswer() {
    document.body.innerHTML = `
    <h1>🤪كنت عارف انك هتختاري الاجابة الصح </h1>
    <p>يلا قربنا نخلص اللعبه </p>

    <button onclick="nextPage2()">خش ع اللي بعده </button>
    `;
}

  function nextPage2() {
    document.body.innerHTML = `
    <h1> مين البيست فرند لكريم ؟</h1>

    <button onclick="nextPage3()">salma</button>
    <button onclick="nextPage3()">سلمي </button>
    <button onclick="nextPage3()">solly</button>
    `;
}
  
   function nextPage3() {
    document.body.innerHTML = `
    <h1>😂❤️ كنت عارف علفكرا </h1>
    <button onclick="nextPage4()">يلا اللي بعده </button>
  `;
}

   function nextPage4() {
    document.body.innerHTML = `
    <h1>طبعا شايفك وانتي بتضحكي علي الهطل اللي بيحصل ده😂 </h1>
   <p>زي القمر كالعادة </p>
 <p>تعالي بقا عشان في كلام مهم </p>
    <button onclick="nextPage5()">وريني  </button>
`;
}

function nextPage5() {
    document.body.innerHTML = `
    <h1>بصي يا سلمي  </h1>
   <p>You’re not just someone I care, you’re someone who makes everything around me feel lighter and better. </p>  
      <p>The way you think, smile, and care about things makes you different in the best way </p>  
   <p>I don’t always find the right words, but I know this for sure  that you mean a lot more to me than I can explain, and I’m really grateful to have you in my life ❤️ </p>  
    <button onclick="nextPage6()">كملي   </button>
`;
}

  function nextPage6() {
    document.body.innerHTML = `
    <h1>غمضي عينك و دوسي و بعدين افتحي بعد 5 ثواني   </h1>
        <button onclick="finalPage()">ماشي    </button>
`;
}

    function finalPage() {
    document.body.innerHTML = `
    <div class="container">
        <div class="envelope" onclick="openLetter()">
            ✉️ اضغط هنا
        </div>

        <div id="letter" class="letter hidden">
            <h2>ملاحظة مهمة ❤️</h2>
            <p>
                اكتب هنا كلامك الحقيقي ليها 😌<br><br>
                أنا آسف لو كنت سبب إني أزعلك…<br>
                ومهم عندي إنك تكوني كويسة ❤️
            </p>
        </div>
    </div>
    `;
}

    function openLetter() {
    document.getElementById("letter").classList.remove("hidden");
}
    
</script>

</body>
</html>
